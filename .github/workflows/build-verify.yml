name: Build And Verify

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-verify:
    name: Build And Verify Admin CRM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-crm-build
          path: dist
          if-no-files-found: error
