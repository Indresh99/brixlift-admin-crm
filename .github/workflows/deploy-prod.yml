name: Deploy To Prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  TF_STATE_REGION: us-east-1
  TF_STATE_KEY: admin-crm/prod/terraform.tfstate
  TF_STATE_BUCKET: brixlift-prod-terraform-state-rabbitoy
  ADMIN_CRM_PROD_S3_BUCKET: brixlift-prod-admin-crm-rabbitoy
  ADMIN_CRM_PROD_DOMAIN_NAME: admin-crm.brixlift.com
  HOSTED_ZONE_NAME: brixlift.com
  ADMIN_CRM_PROD_DOMAIN_NAMES: admin-crm.brixlift.com
  ADMIN_CRM_PROD_ACM_CERTIFICATE_ARN: ""
  ADMIN_CRM_API_BASE_URL: http://localhost:8080

jobs:
  deploy-prod:
    name: Deploy Admin CRM To Prod
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform -chdir=terraform/prod init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        run: |
          terraform -chdir=terraform/prod apply -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="site_bucket_name=${ADMIN_CRM_PROD_S3_BUCKET}" \
            -var="aliases=${ADMIN_CRM_PROD_DOMAIN_NAMES}" \
            -var="acm_certificate_arn=${ADMIN_CRM_PROD_ACM_CERTIFICATE_ARN}" \
            -var="hosted_zone_name=${HOSTED_ZONE_NAME}" \
            -var="domain_name=${ADMIN_CRM_PROD_DOMAIN_NAME}"

      - name: Read Terraform outputs
        id: tf
        run: |
          echo "bucket=$(terraform -chdir=terraform/prod output -raw site_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform -chdir=terraform/prod output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        env:
          VITE_API_BASE_URL: ${{ env.ADMIN_CRM_API_BASE_URL }}
        run: npm run build

      - name: Sync static files to S3
        run: aws s3 sync ./dist "s3://${{ steps.tf.outputs.bucket }}" --delete

      - name: Verify S3 upload
        run: aws s3 ls "s3://${{ steps.tf.outputs.bucket }}/index.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/*"
